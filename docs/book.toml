[book]
title = "sigil-stitch"
description = "Type-safe, import-aware, width-aware code generation for multiple languages"
authors = ["Adam Cavendish"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/adamcavendish/sigil-stitch"
edit-url-template = "https://github.com/adamcavendish/sigil-stitch/edit/master/docs/{path}"

[output.html.search]
enable = true
